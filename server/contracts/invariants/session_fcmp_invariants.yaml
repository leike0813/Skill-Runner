version: 1

canonical:
  initial_state: queued
  states:
    - queued
    - running
    - waiting_user
    - waiting_auth
    - succeeded
    - failed
    - canceled
  terminal_states:
    - succeeded
    - failed
    - canceled

transitions:
  - id: TR-01
    source: queued
    event: turn.started
    target: running
  - id: TR-02
    source: running
    event: turn.needs_input
    target: waiting_user
  - id: TR-03
    source: running
    event: auth.required
    target: waiting_auth
  - id: TR-04
    source: waiting_auth
    event: auth.input.accepted
    target: waiting_auth
  - id: TR-05
    source: waiting_auth
    event: auth.challenge.updated
    target: waiting_auth
  - id: TR-06
    source: waiting_auth
    event: auth.completed
    target: queued
  - id: TR-07
    source: waiting_auth
    event: auth.failed
    target: failed
  - id: TR-08
    source: waiting_user
    event: interaction.reply.accepted
    target: queued
  - id: TR-09
    source: waiting_user
    event: interaction.auto_decide.timeout
    target: queued
  - id: TR-10
    source: running
    event: turn.succeeded
    target: succeeded
  - id: TR-11
    source: running
    event: turn.failed
    target: failed
  - id: TR-12
    source: waiting_auth
    event: run.canceled
    target: canceled
  - id: TR-13
    source: waiting_user
    event: run.canceled
    target: canceled
  - id: TR-14
    source: queued
    event: run.canceled
    target: canceled
  - id: TR-15
    source: running
    event: run.canceled
    target: canceled
  - id: TR-16
    source: waiting_user
    event: restart.preserve_waiting
    target: waiting_user
  - id: TR-17
    source: waiting_user
    event: restart.reconcile_failed
    target: failed
  - id: TR-18
    source: queued
    event: restart.reconcile_failed
    target: failed
  - id: TR-19
    source: running
    event: restart.reconcile_failed
    target: failed

fcmp_mapping:
  state_changed:
    - id: FM-01
      source: queued
      target: running
      trigger: turn.started
    - id: FM-02
      source: running
      target: waiting_user
      trigger: turn.needs_input
    - id: FM-03
      source: running
      target: waiting_auth
      trigger: auth.required
    - id: FM-04
      source: waiting_auth
      target: queued
      trigger: auth.completed
    - id: FM-05
      source: waiting_auth
      target: failed
      trigger: auth.failed
    - id: FM-06
      source: waiting_user
      target: queued
      trigger: interaction.reply.accepted
    - id: FM-07
      source: waiting_user
      target: queued
      trigger: interaction.auto_decide.timeout
    - id: FM-08
      source: running
      target: succeeded
      trigger: turn.succeeded
    - id: FM-09
      source: running
      target: failed
      trigger: turn.failed
    - id: FM-10
      source: running
      target: canceled
      trigger: run.canceled
  paired_events:
    - id: PE-01
      event_type: auth.completed
      required_state_change:
        source: waiting_auth
        target: queued
        trigger: auth.completed
    - id: PE-02
      event_type: interaction.reply.accepted
      required_state_change:
        source: waiting_user
        target: queued
        trigger: interaction.reply.accepted
    - id: PE-03
      event_type: interaction.auto_decide.timeout
      required_state_change:
        source: waiting_user
        target: queued
        trigger: interaction.auto_decide.timeout
    - id: PE-04
      event_type: auth.session.completed
      required_state_change:
        source: waiting_auth
        target: queued
        trigger: auth.completed
    - id: PE-05
      event_type: user.input.required
      required_state_change:
        source: running
        target: waiting_user
        trigger: turn.needs_input
    - id: PE-06
      event_type: lifecycle.run.started
      required_state_change:
        source: queued
        target: running
        trigger: turn.started

ordering_rules:
  - id: OR-01
    rule: terminal_state_unique
  - id: OR-02
    rule: waiting_user_requires_input_event
  - id: OR-03
    rule: waiting_auth_requires_auth_event
  - id: OR-04
    rule: seq_monotonic_contiguous
  - id: OR-05
    rule: reply_accepted_precedes_resumed_assistant
  - id: OR-06
    rule: auth_completed_single_consumer
  - id: OR-07
    rule: resume_ticket_single_start
  - id: OR-08
    rule: attempt_boundary_monotonic
  - id: OR-09
    rule: pending_owner_unique
  - id: OR-10
    rule: pending_history_attempt_consistent
  - id: OR-11
    rule: interaction_identity_unique_per_attempt
  - id: OR-12
    rule: terminal_result_matches_status
  - id: OR-13
    rule: recovery_resume_winner_unique
  - id: OR-14
    rule: waiting_auth_requires_session_capability
  - id: OR-15
    rule: waiting_user_requires_interactive_session_capability
  - id: OR-16
    rule: non_session_auth_failfast_boundary
  - id: OR-17
    rule: non_session_interactive_zero_timeout_autoreply
  - id: OR-18
    rule: current_projection_single_source_of_truth
  - id: OR-19
    rule: non_terminal_status_must_not_have_terminal_result
  - id: OR-20
    rule: terminal_result_requires_terminal_status
  - id: OR-21
    rule: current_pending_owner_matches_status
  - id: OR-22
    rule: leaving_waiting_clears_previous_pending_owner
  - id: OR-23
    rule: queued_redrive_requires_run_dir
  - id: OR-24
    rule: orphan_queued_run_reconciles_terminal
  - id: OR-25
    rule: runtime_slot_release_on_nonstarted_exit
  - id: OR-23
    rule: current_projection_and_resume_ticket_consistent
  - id: OR-24
    rule: fcmp_current_state_must_match_projection
  - id: OR-25
    rule: queued_requires_state_file
  - id: OR-26
    rule: dispatch_phase_monotonic
  - id: OR-27
    rule: state_file_single_source_of_truth
  - id: OR-28
    rule: worker_claim_precedes_attempt_start
  - id: OR-29
    rule: attempt_audit_skeleton_precedes_turn_started
  - id: OR-30
    rule: terminal_result_terminal_only
  - id: OR-31
    rule: pending_owner_embedded_in_state
  - id: OR-32
    rule: audit_files_are_history_only
  - id: OR-33
    rule: parser_diagnostics_non_authoritative
  - id: OR-34
    rule: state_and_dispatch_consistent
  - id: OR-35
    rule: fcmp_live_publish_precedes_audit_mirror
  - id: OR-36
    rule: rasp_live_publish_precedes_audit_mirror
  - id: OR-37
    rule: sse_delivery_must_not_depend_on_fcmp_file_materialization
  - id: OR-38
    rule: history_memory_first_audit_fallback
  - id: OR-39
    rule: fcmp_seq_assigned_at_publish_time
  - id: OR-40
    rule: auth_completion_requires_terminal_session_state
  - id: OR-41
    rule: auth_ready_must_not_drive_resume
  - id: OR-42
    rule: waiting_auth_exit_requires_auth_completed
  - id: OR-43
    rule: resume_ticket_auth_completed_requires_canonical_completion
  - id: OR-44
    rule: single_method_busy_reprojects_challenge_without_resume
  - id: OR-40
    rule: rasp_seq_assigned_at_publish_time
  - id: OR-41
    rule: fcmp_rasp_publish_order_must_be_stable_per_emission
  - id: OR-42
    rule: publish_order_is_canonical_for_active_runtime_events
  - id: OR-43
    rule: audit_mirror_must_not_redefine_active_event_order
  - id: OR-44
    rule: rasp_order_defined_by_live_parser_emission_order
  - id: OR-45
    rule: fcmp_order_defined_by_shared_publisher_sequence
  - id: OR-46
    rule: auth_selection_must_precede_dependent_challenge_publication
  - id: OR-47
    rule: waiting_state_must_not_emit_terminal_result_projection
  - id: OR-48
    rule: history_replay_must_preserve_canonical_publish_order
  - id: OR-49
    rule: batch_backfill_must_not_override_live_order
  - id: OR-50
    rule: conversation_lifecycle_normalized_to_state_changed_only
  - id: OR-51
    rule: single_method_auth_challenge_bypasses_selection
  - id: OR-52
    rule: single_method_auth_busy_reprojects_existing_challenge
  - id: OR-53
    rule: terminal_failed_should_include_error_summary_when_available
