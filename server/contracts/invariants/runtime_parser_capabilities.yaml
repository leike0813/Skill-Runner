version: 1

common:
  unknown_engine_fallback:
    parser: unknown
    confidence: 0.2
    diagnostics:
      - UNKNOWN_ENGINE_PROFILE
    taxonomy:
      severity: warning
      pattern_kind: parser_unknown_engine
      source_type: parser:fallback
      authoritative: false
  low_confidence_parse_threshold:
    lt: 0.7
    taxonomy:
      severity: warning
      pattern_kind: parser_low_confidence
      source_type: parser:confidence
      authoritative: false

