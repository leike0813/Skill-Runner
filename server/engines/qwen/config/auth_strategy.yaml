in_conversation:
  transport: oauth_proxy
providers:
  qwen-oauth:
    transports:
      oauth_proxy:
        methods:
          - auth_code_or_url
        driver:
          start_method: auth
          execution_mode: protocol_proxy
        session_behavior:
          input_required: false
          polling_start: immediate
      cli_delegate:
        methods:
          - auth_code_or_url
        driver:
          start_method: auth
          execution_mode: cli_delegate
    in_conversation:
      methods:
        - auth_code_or_url
  coding-plan-china:
    transports:
      oauth_proxy:
        methods:
          - api_key
        driver:
          start_method: auth
          execution_mode: protocol_proxy
      cli_delegate:
        methods:
          - api_key
        driver:
          start_method: auth
          execution_mode: cli_delegate
    in_conversation:
      methods:
        - api_key
  coding-plan-global:
    transports:
      oauth_proxy:
        methods:
          - api_key
        driver:
          start_method: auth
          execution_mode: protocol_proxy
      cli_delegate:
        methods:
          - api_key
        driver:
          start_method: auth
          execution_mode: cli_delegate
    in_conversation:
      methods:
        - api_key
