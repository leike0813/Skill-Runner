in_conversation:
  transport: oauth_proxy
providers:
  coding-plan-china:
    transports: &api_key_transports
      oauth_proxy:
        methods:
          - api_key
        driver:
          start_method: auth
          execution_mode: protocol_proxy
    in_conversation: &api_key_conversation
      methods:
        - api_key
  coding-plan-global:
    transports: *api_key_transports
    in_conversation: *api_key_conversation
  token-plan:
    transports: *api_key_transports
    in_conversation: *api_key_conversation
  alibaba-standard:
    transports: *api_key_transports
    in_conversation: *api_key_conversation
  deepseek:
    transports: *api_key_transports
    in_conversation: *api_key_conversation
  minimax:
    transports: *api_key_transports
    in_conversation: *api_key_conversation
  zai:
    transports: *api_key_transports
    in_conversation: *api_key_conversation
  idealab:
    transports: *api_key_transports
    in_conversation: *api_key_conversation
  modelscope:
    transports: *api_key_transports
    in_conversation: *api_key_conversation
  openrouter:
    transports: *api_key_transports
    in_conversation: *api_key_conversation
  requesty:
    transports: *api_key_transports
    in_conversation: *api_key_conversation
