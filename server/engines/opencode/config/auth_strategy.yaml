in_conversation:
  transport: oauth_proxy
providers:
  openai:
    transports:
      oauth_proxy:
        methods:
          - callback
          - auth_code_or_url
        driver:
          start_method: auth
          execution_mode: protocol_proxy
      cli_delegate:
        methods:
          - callback
          - auth_code_or_url
        driver:
          start_method: auth
          execution_mode: cli_delegate
    in_conversation:
      methods:
        - callback
        - device_auth
        - import
  anthropic:
    transports: &api_key_transports
      oauth_proxy:
        methods:
          - api_key
        driver:
          start_method: auth
          execution_mode: protocol_proxy
    in_conversation: &api_key_conversation
      methods:
        - api_key
  deepseek:
    transports: *api_key_transports
    in_conversation: *api_key_conversation
  iflowcn:
    transports: *api_key_transports
    in_conversation: *api_key_conversation
  minimax:
    transports: *api_key_transports
    in_conversation: *api_key_conversation
  moonshotai:
