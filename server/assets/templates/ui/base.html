<!DOCTYPE html>
<html lang="{{ lang() }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ t("ui.base.title", default="Skill Runner UI") }}{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link rel="stylesheet" href="/static/css/design-system.css">
    <style>
        .layout { max-width: 1080px; margin: 0 auto; padding: 24px; display: grid; gap: 20px; }
        .muted { color: var(--neutral-500); font-size: 14px; }
        .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        input[type="file"] { border: 1px solid var(--neutral-200); border-radius: 8px; padding: 8px; background: #fff; }
        button { border: 0; border-radius: 8px; background: var(--primary-600); color: #fff; padding: 9px 14px; cursor: pointer; }
        button:hover { background: var(--primary-500); }
        .nav-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-top: 12px; }
        .nav-card {
            border: 1px solid #dbeafe;
            border-radius: 10px;
            padding: 14px;
            background: linear-gradient(180deg, #f8fbff 0%, #f1f5ff 100%);
            color: inherit;
            display: block;
        }
        .nav-card:hover { border-color: #93c5fd; box-shadow: var(--shadow-sm); }
        .nav-title { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
        .nav-desc { color: var(--neutral-500); font-size: 13px; }
        .topbar {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            padding: 10px 24px 0;
            font-size: 12px;
            color: var(--neutral-500);
        }
        .lang-menu {
            position: relative;
            display: inline-block;
        }
        .lang-trigger {
            list-style: none;
            border: 0;
            border-radius: 999px;
            height: 32px;
            width: 132px;
            padding: 0 10px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--neutral-100);
            color: var(--neutral-700);
            cursor: pointer;
            user-select: none;
        }
        .lang-trigger::-webkit-details-marker {
            display: none;
        }
        .lang-trigger::marker {
            content: "";
        }
        .lang-menu[open] .lang-trigger {
            background: var(--neutral-200);
        }
        .lang-trigger-icon {
            font-size: 14px;
            line-height: 1;
        }
        .lang-trigger-label {
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }
        .lang-dropdown {
            position: absolute;
            right: 0;
            top: calc(100% + 6px);
            min-width: 132px;
            background: #fff;
            border: 1px solid var(--neutral-200);
            border-radius: 10px;
            box-shadow: var(--shadow-md);
            padding: 6px;
            z-index: 50;
        }
        .lang-option {
            display: block;
            border-radius: 8px;
            padding: 7px 10px;
            font-size: 12px;
            color: var(--neutral-700);
            text-decoration: none;
        }
        .lang-option:hover {
            background: var(--neutral-100);
        }
        .lang-option.is-active {
            background: var(--primary-50);
            color: var(--primary-700);
            font-weight: 600;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
<div class="topbar">{% include "ui/partials/language_switcher.html" %}</div>
{% block content %}{% endblock %}
{% block extra_scripts %}{% endblock %}
</body>
</html>
