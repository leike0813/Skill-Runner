<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Runner Settings</title>
    <style>
        body { font-family: "Segoe UI", sans-serif; margin: 0; background: #f7f9fc; color: #1f2937; }
        .layout { max-width: 1080px; margin: 0 auto; padding: 24px; display: grid; gap: 20px; }
        .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 18px; }
        .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .stack { display: grid; gap: 10px; }
        .field-grid { display: grid; gap: 14px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
        label { display: grid; gap: 6px; font-size: 13px; color: #374151; }
        input[type="text"], input[type="number"], select {
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 8px;
            background: #fff;
            font-size: 14px;
        }
        button { border: 0; border-radius: 8px; background: #0f766e; color: #fff; padding: 9px 14px; cursor: pointer; }
        button:hover { background: #0b5f58; }
        .btn-secondary {
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background: #fff;
            color: #374151;
            padding: 9px 14px;
            cursor: pointer;
            text-decoration: none;
        }
        .btn-secondary:hover { background: #f9fafb; }
        .muted { color: #6b7280; font-size: 13px; }
        .readonly-grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); margin-top: 10px; }
        .readonly-item {
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            background: #f9fafb;
            padding: 12px;
        }
        .readonly-label { color: #6b7280; font-size: 12px; margin-bottom: 4px; }
        .readonly-value { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 13px; word-break: break-all; }
        .status-box {
            display: none;
            border-radius: 8px;
            padding: 10px;
            font-size: 13px;
            white-space: pre-wrap;
        }
        .status-box.success {
            display: block;
            border: 1px solid #a7f3d0;
            background: #ecfdf5;
            color: #065f46;
        }
        .status-box.error {
            display: block;
            border: 1px solid #fecaca;
            background: #fef2f2;
            color: #991b1b;
        }
        .danger-card {
            border: 1px solid #fecaca;
            background: linear-gradient(180deg, #fff7ed 0%, #fff1f2 100%);
        }
        .danger-title { color: #9f1239; font-weight: 700; }
        .danger-text { color: #7f1d1d; font-size: 13px; margin-top: 6px; }
        .danger-options { display: grid; gap: 8px; margin-top: 10px; font-size: 13px; color: #374151; }
        .danger-btn {
            border: 0;
            border-radius: 8px;
            background: #b91c1c;
            color: #fff;
            padding: 9px 14px;
            cursor: pointer;
            font-weight: 600;
        }
        .danger-btn:hover { background: #991b1b; }
        .danger-result {
            margin-top: 12px;
            border: 1px solid #fecaca;
            border-radius: 8px;
            background: #fff;
            padding: 10px;
            font-size: 13px;
            color: #111827;
            display: none;
            white-space: pre-wrap;
        }
        .danger-result.error {
            border-color: #fca5a5;
            background: #fef2f2;
            color: #991b1b;
        }
        .modal-mask {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.55);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 16px;
        }
        .modal {
            width: min(560px, 100%);
            background: #fff;
            border-radius: 12px;
            border: 1px solid #fecaca;
            box-shadow: 0 16px 40px rgba(15, 23, 42, 0.2);
            padding: 16px;
        }
        .modal h3 { margin: 0 0 8px; color: #991b1b; }
        .modal p { margin: 0 0 10px; color: #374151; font-size: 13px; }
        .modal-confirm {
            margin: 8px 0;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
            border-radius: 6px;
            padding: 8px;
            font-size: 12px;
        }
        .modal input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 8px;
            font-size: 14px;
        }
        .modal-actions {
            margin-top: 12px;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }
        .danger-btn[disabled],
        .btn-secondary[disabled],
        button[disabled] { opacity: 0.55; cursor: not-allowed; }
    </style>
</head>
<body>
<div class="layout">
    <div class="card">
        <div class="row" style="justify-content:space-between;">
            <div>
                <h1 style="margin:0 0 8px;">设置</h1>
                <div class="muted">管理运行时日志设置，并在受保护的危险操作区执行项目数据重置。</div>
            </div>
            <a class="btn-secondary" href="/ui">返回首页</a>
        </div>
    </div>

    {% include "ui/partials/settings_logging_panel.html" %}
    {% include "ui/partials/settings_reset_panel.html" %}
</div>

<div id="danger-reset-modal" class="modal-mask" aria-hidden="true">
    <div class="modal">
        <h3>确认执行危险操作</h3>
        <p>请输入下方确认文本后才能执行。该操作可能导致正在进行的任务状态丢失。</p>
        <div class="modal-confirm" id="danger-reset-confirmation-text">{{ reset_confirmation_text }}</div>
        <input id="danger-reset-confirm-input" type="text" placeholder="输入确认文本以继续">
        <div class="modal-actions">
            <button id="danger-reset-cancel-btn" type="button" class="btn-secondary">取消</button>
            <button id="danger-reset-execute-btn" type="button" class="danger-btn" disabled>确认并执行</button>
        </div>
    </div>
</div>

<script>
(function () {
    const settingsEndpoint = "/v1/management/system/settings";
    const resetEndpoint = "/v1/management/system/reset-data";
    const loggingForm = document.getElementById("logging-settings-form");
    const loggingResult = document.getElementById("logging-settings-result");
    const confirmationText = {{ reset_confirmation_text | tojson }};
    const openBtn = document.getElementById("danger-reset-open-btn");
    const modal = document.getElementById("danger-reset-modal");
    const cancelBtn = document.getElementById("danger-reset-cancel-btn");
    const executeBtn = document.getElementById("danger-reset-execute-btn");
    const confirmInput = document.getElementById("danger-reset-confirm-input");
    const resultBox = document.getElementById("danger-reset-result");

    function setStatus(target, text, kind) {
        target.className = "status-box " + kind;
        target.textContent = text;
    }

    if (loggingForm) {
        loggingForm.addEventListener("submit", async function (event) {
            event.preventDefault();
            const payload = {
                logging: {
                    level: document.getElementById("logging-level").value,
                    format: document.getElementById("logging-format").value,
                    retention_days: Number(document.getElementById("logging-retention-days").value),
                    dir_max_bytes: Number(document.getElementById("logging-dir-max-bytes").value)
                }
            };
            try {
                const response = await fetch(settingsEndpoint, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                if (!response.ok) {
                    const message = typeof data.detail === "string" ? data.detail : "保存失败";
                    setStatus(loggingResult, "保存失败: " + message, "error");
                    return;
                }
                const editable = data.logging.editable;
                document.getElementById("logging-level").value = editable.level;
                document.getElementById("logging-format").value = editable.format;
                document.getElementById("logging-retention-days").value = editable.retention_days;
                document.getElementById("logging-dir-max-bytes").value = editable.dir_max_bytes;
                setStatus(loggingResult, "日志设置已更新并热应用。", "success");
            } catch (error) {
                setStatus(loggingResult, "保存失败: 网络或服务异常", "error");
            }
        });
    }

    function closeModal() {
        modal.style.display = "none";
        modal.setAttribute("aria-hidden", "true");
        confirmInput.value = "";
        executeBtn.disabled = true;
    }

    function showResetResult(text, isError) {
        resultBox.style.display = "block";
        resultBox.classList.toggle("error", Boolean(isError));
        resultBox.textContent = text;
    }

    openBtn.addEventListener("click", function () {
        modal.style.display = "flex";
        modal.setAttribute("aria-hidden", "false");
        confirmInput.focus();
    });
    cancelBtn.addEventListener("click", closeModal);
    modal.addEventListener("click", function (event) {
        if (event.target === modal) {
            closeModal();
        }
    });
    confirmInput.addEventListener("input", function () {
        const normalized = confirmInput.value.trim();
        executeBtn.disabled = normalized !== confirmationText;
    });

    executeBtn.addEventListener("click", async function () {
        executeBtn.disabled = true;
        try {
            const includeEngineAuth = document.getElementById("reset-include-engine-auth-sessions");
            const payload = {
                confirmation: confirmInput.value.trim(),
                dry_run: document.getElementById("reset-dry-run").checked,
                include_logs: document.getElementById("reset-include-logs").checked,
                include_engine_catalog: document.getElementById("reset-include-engine-catalog").checked,
                include_agent_status: document.getElementById("reset-include-agent-status").checked,
                include_engine_auth_sessions: Boolean(includeEngineAuth && includeEngineAuth.checked)
            };
            const response = await fetch(resetEndpoint, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            if (!response.ok) {
                const message = typeof data.detail === "string" ? data.detail : "重置失败";
                showResetResult("执行失败: " + message, true);
                return;
            }
            showResetResult(
                "执行成功\\n" +
                "deleted=" + data.deleted_count +
                ", missing=" + data.missing_count +
                ", recreated=" + data.recreated_count,
                false
            );
        } catch (error) {
            showResetResult("执行失败: 网络或服务异常", true);
        } finally {
            closeModal();
        }
    });
})();
</script>
</body>
</html>
