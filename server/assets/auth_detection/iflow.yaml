version: 1
engine: iflow
rules:
  - id: iflow_server_oauth2_required
    enabled: true
    priority: 900
    match:
      all:
        - field: combined_text
          op: regex
          value: "SERVER_OAUTH2_REQUIRED"
    classify:
      classification: auth_required
      subcategory: oauth_reauth
      confidence: high
  - id: iflow_oauth_token_expired_text
    enabled: true
    priority: 800
    match:
      all:
        - field: combined_text
          op: regex
          value: "OAuth2.*令牌已过期|token已过期|需要重新认证|需要使用服务器OAuth2流程"
    classify:
      classification: auth_required
      subcategory: oauth_reauth
      confidence: high
