version: 1
engine: codex
rules:
  - id: codex_missing_bearer_401
    enabled: true
    priority: 900
    match:
      all:
        - field: combined_text
          op: regex
          value: "401\\s+Unauthorized"
        - field: combined_text
          op: regex
          value: "Missing bearer or basic authentication in header"
    classify:
      classification: auth_required
      subcategory: api_key_missing
      confidence: high
