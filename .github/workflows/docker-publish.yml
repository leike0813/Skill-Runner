name: Docker Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag (e.g. v0.2.0). Leave empty to use manual-<sha>."
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      IMAGE_NAME: skill-runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image tag
        id: vars
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION="manual-${GITHUB_SHA::7}"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

      - name: Render release compose asset
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          python3 scripts/render_release_compose.py \
            --template docker-compose.release.tmpl.yml \
            --output dist/docker-compose.release.yml \
            --image-repo "${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}" \
            --image-tag "${{ steps.vars.outputs.version }}"

      - name: Validate rendered compose asset
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          docker compose -f dist/docker-compose.release.yml config >/dev/null

      - name: Generate compose asset checksum
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          sha256sum dist/docker-compose.release.yml > dist/docker-compose.release.yml.sha256

      - name: Build source release package
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          mkdir -p dist
          INTEGRITY_MANIFEST="release_integrity_manifest.json"
          python3 scripts/generate_release_integrity_manifest.py --root . --output "${INTEGRITY_MANIFEST}"
          PACKAGE="skill-runner-${{ steps.vars.outputs.version }}.tar.gz"
          tar \
            --exclude='./.git' \
            --exclude='./dist' \
            --exclude='./.pytest_cache' \
            --exclude='./.mypy_cache' \
            --exclude='./__pycache__' \
            -czf "dist/${PACKAGE}" \
            .
          rm -f "${INTEGRITY_MANIFEST}"
          sha256sum "dist/${PACKAGE}" > "dist/${PACKAGE}.sha256"

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/docker-compose.release.yml
            dist/docker-compose.release.yml.sha256
            dist/skill-runner-${{ steps.vars.outputs.version }}.tar.gz
            dist/skill-runner-${{ steps.vars.outputs.version }}.tar.gz.sha256
